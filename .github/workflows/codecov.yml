name: Test and Codecov Upload

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test-and-coverage:
    runs-on: ubuntu-latest
    steps:
      # 1. GitHub repodaki kodları çek
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Node.js ortamını kur
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # Projende kullandığın node versiyonuyla değiştirebilirsin

      # 3. Bağımlılıkları (paketleri) yükle
      - name: Install dependencies
        run: npm install

      # 4. Testleri çalıştır ve coverage raporu al (Önceki ekrandaki komut)
      - name: Run tests with coverage
        run: npx jest --coverage

      # 5. Görüntüdeki "Step 4" kod bloğu: Raporu Codecov'a yükle
      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
