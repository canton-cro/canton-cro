name: LocalNet drill

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

concurrency:
  group: localnet-drill-${{ github.ref }}
  cancel-in-progress: true

jobs:
  cli-and-fault-drill:
    name: CLI tests + ACS fault drill
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cli
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: cli/package-lock.json
      - name: Install and test
        run: |
          npm ci
          npm test
      - name: Fault drill (broken + partial ACS import)
        run: bash scripts/fault-drill.sh

  localnet-drill:
    name: LocalNet 2-participant ping drill
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - name: Cache Canton OSS
        uses: actions/cache@v4
        with:
          path: vendor
          key: canton-oss-3.5.8-${{ runner.os }}
      - name: Run 2-participant ping
        run: bash localnet/scripts/localnet-drill.sh
      - name: Upload ping proof
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: localnet-ping-proof
          path: localnet/out/ci-ping-proof.txt
          if-no-files-found: ignore

  live-fault-drill:
    name: REAL broken-ACS drill (break -> diagnose -> restore -> resume)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: cli/package-lock.json
      - name: Cache Canton OSS
        uses: actions/cache@v4
        with:
          path: vendor
          key: canton-oss-3.5.8-${{ runner.os }}
      - name: Install CLI deps
        run: npm ci
        working-directory: cli
      - name: Run real fault drill
        run: bash cli/scripts/live-fault-drill.sh ci-fault-a8
      - name: Upload drill evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fault-drill-evidence
          path: |
            cli/runs/ci-fault-a8/diagnosis.json
            cli/runs/ci-fault-a8/state.json
            cli/runs/ci-fault-a8/events.jsonl
            localnet/out/fault-*.out
          if-no-files-found: ignore
